<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist - XKMIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-card">
        <h1 class="logo-gothic">XKMIX</h1>
        <p class="subtitle">Controle de Operação</p>

        <div class="form-header">
            <input type="text" placeholder="Responsável" id="responsavel">
        </div>

        <div class="checklist-container">
            <details class="section-group" open>
                <summary> Couch 🛋️ SALÃO</summary>
                <div class="checklist-grid">
                    <label class="item"><input type="checkbox"><span>Bandeira recolhida</span></label>
                    <label class="item"><input type="checkbox"><span>Mesas e Cadeiras limpos e guardados</span></label>
                    <label class="item"><input type="checkbox"><span>Vidros e Vitrine Limpos</span></label>
                    <label class="item"><input type="checkbox"><span>Lixeiras com saco</span></label>
                    <label class="item"><input type="checkbox"><span>Chão limpo</span></label>
                    <label class="item"><input type="checkbox"><span>Bancada de complemento limpae e fechada</span></label>
                </div>
            </details>

            <details class="section-group">
                <summary>🍦 COZINHA / ALIMENTOS</summary>
                <div class="checklist-grid">
                    <label class="item"><input type="checkbox"><span>Frutas Cortadas e Guardadas</span></label>
                    <label class="item"><input type="checkbox"><span>Salgados Guardados</span></label>
                    <label class="item"><input type="checkbox"><span>Leite Condensado Guardados</span></label>
                    <label class="item"><input type="checkbox"><span>Frizzer e Geladeira Limpos</span></label>
                    <label class="item"><input type="checkbox"><span>Cremes Mexidos</span></label>
                </div>
            </details>

            <details class="section-group">
                <summary>🖥️ ELETRÔNICOS / FECHAMENTO</summary>
                <div class="checklist-grid">
                    <label class="item"><input type="checkbox"><span>Caixa Fechado</span></label>
                    <label class="item"><input type="checkbox"><span>Sangrias verificadas</span></label>
                    <label class="item"><input type="checkbox"><span>Maquinetas e balanças OFF</span></label>
                    <label class="item"><input type="checkbox"><span>Bancada organizada</span></label>
                    <label class="item"><input type="checkbox"><span>Anotar o valor restante no caixa</span></label>
                </div>
            </details>
            
            <textarea placeholder="Observações do dia..." id="obs"></textarea>
        </div> <button class="floating-btn" onclick="enviar()">ENVIAR CHECKLIST ✅</button>
        
        <a href="../index.html" class="back-link">← Voltar ao Menu</a>
    </div>
</body>
</html>
