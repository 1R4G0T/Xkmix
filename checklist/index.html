<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist XKMIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="captureArea" class="main-card">
        <h1 class="logo-gothic">XKMIX</h1>
        <p class="subtitle">Controle de Operação</p>

        <div class="form-header">
            <input type="text" id="unidade" placeholder="Unidade">
            <input type="text" id="responsavel" placeholder="Responsável">
        </div>

        <details class="section-group">
            <summary> Couch 🛋️ SALÃO</summary>
            <div class="checklist-grid">
                <label class="item"><input type="checkbox"><span>Bandeira recolhida</span></label>
                <label class="item"><input type="checkbox"><span>Mesas e Cadeiras</span></label>
                <label class="item"><input type="checkbox"><span>Vidros Limpos</span></label>
                <label class="item"><input type="checkbox"><span>Lixeiras com saco de lixo</span></label>
                <label class="item"><input type="checkbox"><span>Chão limpo</span></label>
                <label class="item"><input type="checkbox"><span>Bancada de complemento limpa</span></label>
                <label class="item"><input type="checkbox"><span>Boleado e pote de agua limpos</span></label>
                <label class="item"><input type="checkbox"><span>Copos e MR Abastecidos</span></label>
            </div>
        </details>

        <details class="section-group">
            <summary>🍦 COZINHA / ALIMENTOS</summary>
            <div class="checklist-grid">
                <label class="item"><input type="checkbox"><span>Frutas Guardadas</span></label>
                <label class="item"><input type="checkbox"><span>Frutas Cortadas</span></label>
                <label class="item"><input type="checkbox"><span>Salgados Guardados</span></label>
                <label class="item"><input type="checkbox"><span>Leite Condensado</span></label>
                <label class="item"><input type="checkbox"><span>Chão limpo</span></label>
                <label class="item"><input type="checkbox"><span>Bancada limpa</span></label>
                <label class="item"><input type="checkbox"><span>Equipamentos Limpos</span></label>
                <label class="item"><input type="checkbox"><span>Cremes Mexidos</span></label>
            </div>
        </details>

        <details class="section-group">
            <summary>🖥️ ELETRÔNICOS / FECHAMENTO</summary>
            <div class="checklist-grid">
                <label class="item"><input type="checkbox"><span>Caixa Fechado</span></label>
                <label class="item"><input type="checkbox"><span>Nota do caixa dia seguinte</span></label>
                <label class="item"><input type="checkbox"><span>Verificar sangrias</span></label>
                <label class="item"><input type="checkbox"><span>Desligar eletrônicos</span></label>
                <label class="item"><input type="checkbox"><span>Organizar a bancada</span></label>
            </div>
        </details>

        <textarea id="obs" placeholder="Observações do dia..." rows="3"></textarea>
    </div>

    <button class="floating-btn" onclick="gerarRelatorio()">Enviar Checklist ✅</button>
    
    <a href="../index.html" class="back-link" style="display:block; text-align:center; color:#b39ddb; margin-top:15px; text-decoration:none;">⬅ Voltar ao Menu</a>

    <script src="script.js"></script>
</body>
</html>
