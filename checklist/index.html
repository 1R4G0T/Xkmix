<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist XKMIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="captureArea" class="main-card">
        <h1 class="logo-gothic">XKMIX</h1>
        <p class="subtitle">Controle de Operação</p>

        <div class="form-header">
            <input type="text" id="unidade" placeholder="Unidade">
            <input type="text" id="responsavel" placeholder="Responsável">
        </div>

        <details class="section-group" open>
            <summary>🛋️ SALÃO</summary>
            <div class="checklist-grid">
                <label class="item"><input type="checkbox"><span>Bandeira recolhida</span></label>
                <label class="item"><input type="checkbox"><span>Mesas e Cadeiras limpas</span></label>
                <label class="item"><input type="checkbox"><span>Vidros e Vitrines limpos</span></label>
                <label class="item"><input type="checkbox"><span>Lixeiras com saco de lixo</span></label>
                <label class="item"><input type="checkbox"><span>Chão varrido e passado pano</span></label>
                <label class="item"><input type="checkbox"><span>Bancada de complementos limpa e tampados</span></label>
                <label class="item"><input type="checkbox"><span>Boleador e potes higienizados</span></label>
                <label class="item"><input type="checkbox"><span>Copos e descartáveis abastecidos</span></label>
            </div>
        </details>

        <details class="section-group">
            <summary>🍦 COZINHA / ALIMENTOS</summary>
            <div class="checklist-grid">
                <label class="item"><input type="checkbox"><span>Frutas guardadas/cortadas</span></label>
                <label class="item"><input type="checkbox"><span>Salgados devidamente guardados</span></label>
                <label class="item"><input type="checkbox"><span>Leite condensado guardados</span></label>
                <label class="item"><input type="checkbox"><span>Bancadas e pias limpas</span></label>
                <label class="item"><input type="checkbox"><span>Freezers e geladeiras limpos</span></label>
                <label class="item"><input type="checkbox"><span>Cremes mexidos e organizados</span></label>
            </div>
        </details>

        <details class="section-group">
            <summary>🖥️ ELETRÔNICOS / FECHAMENTO</summary>
            <div class="checklist-grid">
                <label class="item"><input type="checkbox"><span>Caixa conferido e fechado</span></label>
                <label class="item"><input type="checkbox"><span>Valor de caixa anotado</span></label>
                <label class="item"><input type="checkbox"><span>Sangrias verificadas</span></label>
                <label class="item"><input type="checkbox"><span>Maquinetas e balanças desligadas</span></label>
                <label class="item"><input type="checkbox"><span>Ar condicionado/Luzes desligadas</span></label>
            </div>
        </details>

        <textarea id="obs" placeholder="Alguma observação importante do dia?" rows="3"></textarea>
    </div>

    <button class="floating-btn" onclick="gerarRelatorio()">Enviar Checklist ✅</button>
    
    <a href="../index.html" class="back-link" style="display:block; text-align:center; color:#b39ddb; margin-top:20px; text-decoration:none; font-weight:600;">⬅ Voltar ao Menu Principal</a>

    <script src="script.js"></script>
</body>
</html>
