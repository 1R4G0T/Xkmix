<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist - XKMIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-card">
        <h1 class="logo-gothic">XKMIX</h1>
        <p class="subtitle">Controle de Operação</p>

        <div class="form-header">
            <input type="text" placeholder="Unidade" id="unidade">
            <input type="text" placeholder="Responsável" id="responsavel">
        </div>

        <div class="checklist-container">
            <details class="section-group">
                <summary>🛋️ SALÃO / COUCH</summary>
                <div class="checklist-grid">
                    <label class="item"><input type="checkbox"> Limpeza do chão</label>
                    <label class="item"><input type="checkbox"> Organização mesas</label>
                </div>
            </details>

            <details class="section-group">
                <summary>🍦 COZINHA / ALIMENTOS</summary>
                <div class="checklist-grid">
                    <label class="item"><input type="checkbox"> Validade produtos</label>
                    <label class="item"><input type="checkbox"> Higiene bancada</label>
                </div>
            </details>

            <textarea placeholder="Observações do dia..." id="obs"></textarea>
        </div>

        <button class="floating-btn" onclick="enviar()">ENVIAR CHECKLIST ✅</button>
        
        <a href="../index.html" class="back-link">← Voltar ao Menu</a>
    </div>
</body>
</html>
