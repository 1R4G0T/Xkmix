<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XKMIX - Sistema Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="main-card">
    <h1 class="logo-gothic">XKMIX</h1>
    <p class="subtitle">Sistema de Gestão Interna</p>
    
    <div id="loginArea">
        <select id="selectLoja" class="login-select">
            <option value="">Selecione a Unidade</option>
            <option value="pdp">PDP</option>
            <option value="tj">TJ</option>
            <option value="goiania">Goiania</option>
            <option value="cdv">CDV</option>
            <option value="adm">Administrador</option>
        </select>

        <input type="password" id="senhaAcesso" class="login-select" placeholder="Digite a Senha">
        
        <button class="menu-item login-btn" onclick="verificarAcesso()">Entrar</button>
    </div>

    <div id="menuPrincipal" style="display: none;">
        <div class="menu-grid">
            <a href="checklist/index.html" class="menu-item">
                <span class="icon">📋</span>
                <span>Checklist</span>
            </a>
            <a href="estoque/index.html" class="menu-item">
                <span class="icon">📦</span>
                <span>Estoque</span>
            </a>
            <a href="abastecimento/index.html" class="menu-item">
                <span class="icon">🚚</span>
                <span>Abastecer</span>
            </a>
            <a href="pedido/index.html" class="menu-item">
                <span class="icon">🛒</span>
                <span>Pedidos</span>
            </a>
        </div>
        
        <a href="adm.html" id="btnAdm" class="menu-item adm-btn" style="display:none;">
            <span>⚙️ Painel Administrador</span>
        </a>
    </div>
</div> 
<script src="main.js"></script>
</body>
</html>
